name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown lint + link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        # Dependabot bumps package.json without updating bun.lock; its PRs get
        # the lockfile regenerated and committed by dependabot-lockfile.yml.
        # Allow the lockfile to drift for those runs; enforce it for everyone
        # else so a stale lockfile never reaches main unnoticed.
        env:
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$ACTOR" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Content lint (markdownlint-cli2)
        run: bun run lint:md

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          # Offline: validate internal/relative links and skip flaky external
          # hosts. Scope to user-facing docs — templates contain placeholder
          # paths for the consumer's own repo, and docs/superpowers holds
          # internal planning docs; neither should be link-checked here.
          args: >-
            --no-progress
            --offline
            "README.md"
            "CONTRIBUTING.md"
            "docs/anatomy.md"
            "docs/best-practices.md"
            "docs/nesting-monorepos.md"
            "docs/common-mistakes.md"
            "packages/linter/README.md"
            "packages/migrate/README.md"
          fail: true

  test-and-dogfood:
    name: Build, test + self-dogfood templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        # See the markdown job above: tolerate Dependabot's stale lockfile,
        # enforce a frozen lockfile for all other actors.
        env:
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$ACTOR" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Run linter unit tests
        run: bun test
        working-directory: packages/linter

      - name: Build linter
        run: bun run build
        working-directory: packages/linter

      - name: Self-dogfood — lint all templates with agents-md-lint
        run: bun packages/linter/dist/cli.js "templates/**/AGENTS.md" --format text
