name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown lint + link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Content lint (markdownlint-cli2)
        run: bun run lint:md

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-mail
            "**/*.md"
          fail: true

  test-and-dogfood:
    name: Build, test + self-dogfood templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter unit tests
        run: bun test
        working-directory: packages/linter

      - name: Build linter
        run: bun run build
        working-directory: packages/linter

      - name: Self-dogfood — lint all templates with agents-md-lint
        run: bun packages/linter/dist/cli.js "templates/**/AGENTS.md" --format text
