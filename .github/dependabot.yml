# Dependabot configuration for agents-md-cookbook.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2

updates:
  # JavaScript / TypeScript dependencies across the Bun workspace.
  # The npm ecosystem reads the root bun.lock, so a single "/" entry covers
  # the root manifest plus every package under packages/*. It bumps the
  # manifests but does NOT update bun.lock, so .github/workflows/
  # dependabot-lockfile.yml regenerates and commits the lockfile on each PR.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Batch low-risk updates into one PR; majors still open individually.
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the CI and CodeQL workflows and the composite action.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(actions)"
    groups:
      github-actions:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
